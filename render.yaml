services:
  - type: web
    name: otakuverse-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx nest build
    startCommand: node dist/main.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        value: https://otakuverse-zeta.vercel.app
      - key: BACKEND_URL
        value: https://otakuverse-api.onrender.com
