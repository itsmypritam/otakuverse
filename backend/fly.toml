app = "otakuverse-api"
primary_region = "iad"

[build]

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[checks]
  [checks.health]
    port = 4000
    type = "http"
    interval = "10s"
    timeout = "2s"
    path = "/api"
